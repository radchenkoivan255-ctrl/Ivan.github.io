<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenless Zone Zero - Персонажі, Ампліфікатори та Банбу</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Zenless Zone Zero Database</h1>
        <div class="hamburger" id="hamburger">&#9776;</div>
    </header>

    <nav id="sidebar" class="sidebar">
        <button onclick="showSection('agents')">Агенти</button>
        <button onclick="showSection('wengines')">Ампліфікатори</button>
        <button onclick="showSection('bangboo')">Банбу</button>
        <button onclick="showSection('drivediscs')">Драйв диски</button>
    </nav>

    <main>
        <section id="filters">
            <h2>Фільтри</h2>
            <select id="elementFilter">
                <option value="">Всі елементи</option>
                <option value="Physical">Physical</option>
                <option value="Fire">Fire</option>
                <option value="Ice">Ice</option>
                <option value="Electric">Electric</option>
                <option value="Ether">Ether</option>
            </select>
            <select id="roleFilter">
                <option value="">Всі ролі</option>
                <option value="Attack">Attack</option>
                <option value="Stun">Stun</option>
                <option value="Anomaly">Anomaly</option>
                <option value="Support">Support</option>
                <option value="Defense">Defense</option>
            </select>
            <!-- Кнопка більше не потрібна, фільтри застосовуються автоматично -->
        </section>

        <section id="content" class="grid"></section>
    </main>



    <script src="script.js"></script>
    <script>
        // Автоматичне перемикання вкладки при поверненні з детальної сторінки
        const urlSection = new URLSearchParams(window.location.search).get('section');
        if (urlSection && ['agents', 'wengines', 'bangboo', 'drivediscs'].includes(urlSection)) {
            // Функція showSection вже є у script.js
            showSection(urlSection);
        }
    </script>
</body>

</html>
