<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenless Zone Zero - Персонажі, Ампліфікатори та Банбу</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Zenless Zone Zero Database</h1>
        <div class="hamburger" id="hamburger">&#9776;</div>
    </header>

    <nav id="sidebar" class="sidebar">
        <button onclick="showSection('agents')">Агенти</button>
        <button onclick="showSection('wengines')">Ампліфікатори</button>
        <button onclick="showSection('bangboo')">Банбу</button>
        <button onclick="showSection('drivediscs')">Драйв диски</button>
    </nav>

    <main>
        <!-- Фільтри для агентів -->
        <section id="filters-agents" class="gacha-filters-horizontal">
            <div class="filters-row">
                <!-- Factions drop-down -->
                <div class="factions-dropdown">
                    <button id="factionsToggle" class="filter-btn factions-btn">
                        Factions <span class="arrow-down">▼</span>
                    </button>
                    <div id="factionsPanel" class="factions-panel">
                        <div class="factions-grid">
                            <button data-filter="faction" data-value="Cunning Hares"
                                class="filter-btn faction-option"><img src="image/юб.webp" class="filter-icon" alt="">
                                Cunning Hares</button>
                            <button data-filter="faction" data-value="Victoria Housekeeping"
                                class="filter-btn faction-option"><img src="image3/а.webp" class="filter-icon" alt="">
                                Victoria
                                Housekeeping Co.</button>
                            <button data-filter="faction" data-value="Belobog Heavy Industries"
                                class="filter-btn faction-option"><img src="image3/аб.webp" class="filter-icon" alt="">
                                Belobog Heavy Industries</button>
                            <button data-filter="faction" data-value="Sons of Calydon"
                                class="filter-btn faction-option"><img src="image/ав.webp" class="filter-icon" alt="">
                                Sons of Calydon</button>
                            <button data-filter="faction" data-value="New Eridu Defense Force"
                                class="filter-btn faction-option"><img src="image3/аг.webp" class="filter-icon" alt="">
                                New Eridu Defense Force</button>
                            <button data-filter="faction" data-value="Hollow Special Operations Section 6"
                                class="filter-btn faction-option"><img src="image3/аа.webp" class="filter-icon" alt="">
                                Hollow Special Operations Section 6</button>
                            <button data-filter="faction" data-value="New Eridu Public Security"
                                class="filter-btn faction-option"><img src="image3/ааа.webp" class="filter-icon" alt="">
                                New Eridu Public Security</button>
                            <button data-filter="faction" data-value="Stars of Lyra"
                                class="filter-btn faction-option"><img src="image3/аааа.webp" class="filter-icon"
                                    alt="">
                                Stars of Lyra</button>
                            <button data-filter="faction" data-value="Mockingbird"
                                class="filter-btn faction-option"><img src="image3/ааааа.webp" class="filter-icon"
                                    alt="">
                                Mockingbird</button>
                            <button data-filter="faction" data-value="Yunkui Summit"
                                class="filter-btn faction-option"><img src="image3/аааааа.webp" class="filter-icon"
                                    alt="">
                                Yunkui Summit</button>
                            <button data-filter="faction" data-value="Spook Shack"
                                class="filter-btn faction-option"><img src="image3/ааааааа.webp" class="filter-icon"
                                    alt="">
                                Spook Shack</button>
                            <button data-filter="faction" data-value="Krampus Compliance Authority"
                                class="filter-btn faction-option"><img src="image3/аааааааа.webp" class="filter-icon"
                                    alt="">
                                Krampus Compliance Authority</button>
                            <button data-filter="faction" data-value="Angels of Delusion"
                                class="filter-btn faction-option"><img src="image3/ааааааааа.webp" class="filter-icon"
                                    alt="">
                                Angels of Delusion</button>
                        </div>
                    </div>
                </div>

                <!-- Elements -->
                <div class="filter-icon-group">
                    <button data-filter="element" data-value="Physical" class="filter-icon-btn" title="Physical"><img
                            src="image/ршл.webp" class="filter-icon-img" alt="Physical"></button>
                    <button data-filter="element" data-value="Fire" class="filter-icon-btn" title="Fire"><img
                            src="image/фув.webp" class="filter-icon-img" alt="Fire"></button>
                    <button data-filter="element" data-value="Ice" class="filter-icon-btn" title="Ice"><img
                            src="image/каку.webp" class="filter-icon-img" alt="Ice"></button>
                    <button data-filter="element" data-value="Electric" class="filter-icon-btn" title="Electric"><img
                            src="image/кен.webp" class="filter-icon-img" alt="Electric"></button>
                    <button data-filter="element" data-value="Ether" class="filter-icon-btn" title="Ether"><img
                            src="image/мит.webp" class="filter-icon-img" alt="Ether"></button>
                </div>

                <!-- Roles -->
                <div class="filter-icon-group">
                    <button data-filter="role" data-value="Attack" class="filter-icon-btn" title="Attack"><img
                            src="image/атака.webp" class="filter-icon-img" alt="Attack"></button>
                    <button data-filter="role" data-value="Stun" class="filter-icon-btn" title="Stun"><img
                            src="image/стан.webp" class="filter-icon-img" alt="Stun"></button>
                    <button data-filter="role" data-value="Anomaly" class="filter-icon-btn" title="Anomaly"><img
                            src="image/аномал.webp" class="filter-icon-img" alt="Anomaly"></button>
                    <button data-filter="role" data-value="Support" class="filter-icon-btn" title="Support"><img
                            src="image/сап.webp" class="filter-icon-img" alt="Support"></button>
                    <button data-filter="role" data-value="Defense" class="filter-icon-btn" title="Defense"><img
                            src="image/деф.webp" class="filter-icon-img" alt="Defense"></button>
                    <button data-filter="role" data-value="Rupture" class="filter-icon-btn" title="Rupture"><img
                            src="image/рап.webp" class="filter-icon-img" alt="Rupture"></button>
                </div>

                <!-- Rarity -->
                <div class="filter-icon-group">
                    <button data-filter="rarity" data-value="S" class="filter-icon-btn" title="S rank"><img
                            src="image2/S.webp" class="filter-icon-img" alt="S"></button>
                    <button data-filter="rarity" data-value="A" class="filter-icon-btn" title="A rank"><img
                            src="image2/A.webp" class="filter-icon-img" alt="A"></button>
                </div>

                <!-- Reset -->
                <button id="resetFiltersGacha" class="reset-btn-gacha" title="Reset filters">🗑️ Reset</button>
            </div>
        </section>

        <!-- Фільтри для ампліфікаторів (тільки ранг і роль) -->
        <section id="filters-wengines" class="gacha-filters-horizontal" style="display: none;">
            <div class="filters-row">
                <div class="filter-icon-group">
                    <button data-wfilter="role" data-value="Attack" class="wengine-filter-btn" title="Attack"><img
                            src="image/атака.webp" class="filter-icon-img" alt="Attack"></button>
                    <button data-wfilter="role" data-value="Stun" class="wengine-filter-btn" title="Stun"><img
                            src="image/стан.webp" class="filter-icon-img" alt="Stun"></button>
                    <button data-wfilter="role" data-value="Anomaly" class="wengine-filter-btn" title="Anomaly"><img
                            src="image/аномал.webp" class="filter-icon-img" alt="Anomaly"></button>
                    <button data-wfilter="role" data-value="Support" class="wengine-filter-btn" title="Support"><img
                            src="image/сап.webp" class="filter-icon-img" alt="Support"></button>
                    <button data-wfilter="role" data-value="Defense" class="wengine-filter-btn" title="Defense"><img
                            src="image/деф.webp" class="filter-icon-img" alt="Defense"></button>
                    <button data-wfilter="role" data-value="Rupture" class="wengine-filter-btn" title="Rupture"><img
                            src="image/рап.webp" class="filter-icon-img" alt="Rupture"></button>
                </div>
                <div class="filter-icon-group">
                    <button data-wfilter="rarity" data-value="S" class="wengine-filter-btn" title="S rank"><img
                            src="image2/S.webp" class="filter-icon-img" alt="S"></button>
                    <button data-wfilter="rarity" data-value="A" class="wengine-filter-btn" title="A rank"><img
                            src="image2/A.webp" class="filter-icon-img" alt="A"></button>
                </div>
                <button id="resetWengineFilters" class="reset-btn-gacha" title="Reset filters">🗑️ Reset</button>
            </div>
        </section>

        <section id="content" class="grid"></section>
    </main>

    <script src="script.js"></script>
    <script>
        // Автоматичне перемикання вкладки при поверненні з детальної сторінки
        const urlSection = new URLSearchParams(window.location.search).get('section');
        if (urlSection && ['agents', 'wengines', 'bangboo', 'drivediscs'].includes(urlSection)) {
            showSection(urlSection);
        }
    </script>
</body>

</html>
